<script>
  document.addEventListener('DOMContentLoaded', function() {
    const inputs = document.querySelectorAll('.ref-input');
    const hiddenInput = document.getElementById('full-reference-number');
    const form = document.getElementById('fine-form');

    // 1. Auto-advance logic
    inputs.forEach((input, index) => {
      input.addEventListener('input', function() {
        // If the box hits 4 characters and isn't the last box, jump to the next one
        if (this.value.length === 4 && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });

      // Handle backspace to jump to the previous box if current is empty
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
          inputs[index - 1].focus();
        }
      });
    });

    // 2. Concatenate before submit
    form.addEventListener('submit', function() {
      // Grab all 4 values, join them into one string, and set the hidden input
      const fullNumber = Array.from(inputs).map(input => input.value).join('');
      hiddenInput.value = fullNumber;

      // Note: The form will now naturally submit with referenceNumber = "1234567890123456"
    });
  });
</script>
